<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria de Referências Visuais Globais</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        color: #111827;
      }
      main {
        width: min(1100px, 92vw);
        margin: 24px auto 50px;
      }
      h1 {
        margin: 0 0 14px;
      }
      p {
        margin: 0 0 20px;
        color: #374151;
      }
      .shot {
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 14px;
        margin-bottom: 18px;
        overflow: hidden;
      }
      .shot header {
        padding: 10px 12px;
        border-bottom: 1px solid #e5e7eb;
        background: #f9fafb;
        font-weight: 700;
      }
      .shot img {
        width: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Referências Visuais Globais (Tech + Criação de Sites)</h1>
      <p>Capturas full-page em 14/04/2026 para orientar o redesign visual.</p>

      <section class="shot"><header>Webflow</header><img src="screenshots/webflow.png" alt="Webflow" /></section>
      <section class="shot"><header>Framer</header><img src="screenshots/framer.png" alt="Framer" /></section>
      <section class="shot"><header>Wix Studio</header><img src="screenshots/wix-studio.png" alt="Wix Studio" /></section>
      <section class="shot"><header>Squarespace</header><img src="screenshots/squarespace.png" alt="Squarespace" /></section>
      <section class="shot"><header>Vercel</header><img src="screenshots/vercel.png" alt="Vercel" /></section>
      <section class="shot"><header>Stripe</header><img src="screenshots/stripe.png" alt="Stripe" /></section>
    </main>
  </body>
</html>
