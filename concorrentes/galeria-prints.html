<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria de Prints - Concorrentes</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        color: #111827;
      }
      main {
        width: min(1100px, 92vw);
        margin: 24px auto 50px;
      }
      h1 {
        margin: 0 0 14px;
      }
      p {
        margin: 0 0 20px;
        color: #374151;
      }
      .shot {
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 14px;
        margin-bottom: 18px;
        overflow: hidden;
      }
      .shot header {
        padding: 10px 12px;
        border-bottom: 1px solid #e5e7eb;
        background: #f9fafb;
        font-weight: 700;
      }
      .shot img {
        width: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Prints Full-Page dos Concorrentes</h1>
      <p>Capturados em 14/04/2026 com Playwright (desktop, full-page).</p>

      <section class="shot"><header>CityPubli</header><img src="screenshots/citypubli.png" alt="CityPubli" /></section>
      <section class="shot"><header>Time4U</header><img src="screenshots/time4u.png" alt="Time4U" /></section>
      <section class="shot"><header>GreatPages</header><img src="screenshots/greatpages.png" alt="GreatPages" /></section>
      <section class="shot"><header>Future Marketing</header><img src="screenshots/futuremarketing.png" alt="Future Marketing" /></section>
      <section class="shot"><header>Agência do Médico</header><img src="screenshots/agenciadomedico.png" alt="Agência do Médico" /></section>
      <section class="shot"><header>SiteMédicos</header><img src="screenshots/sitemedicos.png" alt="SiteMédicos" /></section>
      <section class="shot"><header>DoctorApp</header><img src="screenshots/doctorapp.png" alt="DoctorApp" /></section>
    </main>
  </body>
</html>
